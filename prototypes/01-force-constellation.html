<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01 — Force Constellation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; color: #F2F2F0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
  #graph { width: 100vw; height: 100vh; }
  #tooltip {
    position: fixed; pointer-events: none; opacity: 0;
    background: rgba(20,20,20,0.95); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; padding: 12px 16px; max-width: 320px;
    transition: opacity 0.15s ease;
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.01em; }
  #tooltip .level { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.5; margin-bottom: 6px; }
  #tooltip .claim { font-size: 13px; line-height: 1.5; opacity: 0.7; }
  #legend {
    position: fixed; bottom: 24px; left: 24px; z-index: 10;
    display: flex; flex-wrap: wrap; gap: 8px; max-width: 400px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; opacity: 0.5; letter-spacing: 0.02em;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  #info {
    position: fixed; top: 24px; left: 24px; z-index: 10;
    font-size: 13px; opacity: 0.4; line-height: 1.6;
  }
  #info h2 { font-size: 16px; font-weight: 600; opacity: 1; margin-bottom: 4px; }
</style>
</head>
<body>
<div id="info">
  <h2>01 — Force Constellation</h2>
  Classic force-directed graph. Nodes attract along edges, repel otherwise.<br>
  Drag nodes. Scroll to zoom. Hover for details.
</div>
<div id="tooltip">
  <h3 id="tt-title"></h3>
  <div class="level" id="tt-level"></div>
  <div class="claim" id="tt-claim"></div>
</div>
<div id="legend"></div>
<canvas id="graph"></canvas>

<script src="atoms-data.js"></script>
<script>
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Simulation state
const nodes = atoms.map(a => ({
  ...a,
  x: W/2 + (Math.random() - 0.5) * W * 0.6,
  y: H/2 + (Math.random() - 0.5) * H * 0.6,
  vx: 0, vy: 0,
  radius: levelToNum(a.level) === 3 ? 7 : levelToNum(a.level) === 1 ? 3.5 : 5,
  color: getDomainColor(a.domain),
}));

const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

const links = edges.map(e => ({
  source: nodeMap[e.source],
  target: nodeMap[e.target],
  type: e.type,
}));

// Build adjacency for connection count
const connectionCount = {};
atoms.forEach(a => connectionCount[a.id] = 0);
edges.forEach(e => { connectionCount[e.source]++; connectionCount[e.target]++; });
nodes.forEach(n => {
  const count = connectionCount[n.id] || 0;
  n.radius = Math.max(3, Math.min(10, 3 + count * 0.5));
});

// Camera
let camX = 0, camY = 0, zoom = 1;
let dragging = null, dragOffX = 0, dragOffY = 0;
let hoveredNode = null;
let isPanning = false, panStartX = 0, panStartY = 0, camStartX = 0, camStartY = 0;

function screenToWorld(sx, sy) {
  return { x: (sx - W/2) / zoom + camX, y: (sy - H/2) / zoom + camY };
}

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  zoom = Math.max(0.2, Math.min(5, zoom * factor));
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  const world = screenToWorld(e.clientX, e.clientY);
  // Find node under cursor
  let closest = null, closestDist = Infinity;
  nodes.forEach(n => {
    const dx = n.x - world.x, dy = n.y - world.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < n.radius / zoom + 8 && d < closestDist) { closest = n; closestDist = d; }
  });
  if (closest) {
    dragging = closest;
    dragOffX = closest.x - world.x;
    dragOffY = closest.y - world.y;
  } else {
    isPanning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    camStartX = camX;
    camStartY = camY;
  }
});

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    const world = screenToWorld(e.clientX, e.clientY);
    dragging.x = world.x + dragOffX;
    dragging.y = world.y + dragOffY;
    dragging.vx = 0;
    dragging.vy = 0;
  } else if (isPanning) {
    camX = camStartX - (e.clientX - panStartX) / zoom;
    camY = camStartY - (e.clientY - panStartY) / zoom;
  } else {
    // Hover detection
    const world = screenToWorld(e.clientX, e.clientY);
    let closest = null, closestDist = Infinity;
    nodes.forEach(n => {
      const dx = n.x - world.x, dy = n.y - world.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < n.radius / zoom + 12 && d < closestDist) { closest = n; closestDist = d; }
    });
    hoveredNode = closest;
    if (closest) {
      document.getElementById('tt-title').textContent = `#${closest.id} ${closest.title}`;
      document.getElementById('tt-level').textContent = `${closest.level} · ${closest.domain}`;
      document.getElementById('tt-claim').textContent = closest.claim;
      tooltip.classList.add('visible');
      tooltip.style.left = Math.min(e.clientX + 16, W - 340) + 'px';
      tooltip.style.top = Math.min(e.clientY - 10, H - 100) + 'px';
      canvas.style.cursor = 'pointer';
    } else {
      tooltip.classList.remove('visible');
      canvas.style.cursor = 'grab';
    }
  }
});

canvas.addEventListener('mouseup', () => { dragging = null; isPanning = false; });

// Force simulation
const REPULSION = 800;
const LINK_STRENGTH = 0.003;
const LINK_DISTANCE = 80;
const DAMPING = 0.92;
const CENTER_GRAVITY = 0.0005;

function simulate() {
  // Repulsion (Barnes-Hut would be better but 111 nodes is fine with n^2)
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = a.x - b.x, dy = a.y - b.y;
      let d = Math.sqrt(dx*dx + dy*dy) || 1;
      const force = REPULSION / (d * d);
      const fx = (dx / d) * force, fy = (dy / d) * force;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    }
  }

  // Link attraction
  links.forEach(l => {
    const dx = l.target.x - l.source.x;
    const dy = l.target.y - l.source.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    const force = (d - LINK_DISTANCE) * LINK_STRENGTH;
    const fx = (dx / d) * force, fy = (dy / d) * force;
    l.source.vx += fx; l.source.vy += fy;
    l.target.vx -= fx; l.target.vy -= fy;
  });

  // Center gravity
  nodes.forEach(n => {
    if (n === dragging) return;
    n.vx -= (n.x - W/2) * CENTER_GRAVITY;
    n.vy -= (n.y - H/2) * CENTER_GRAVITY;
    n.vx *= DAMPING;
    n.vy *= DAMPING;
    n.x += n.vx;
    n.y += n.vy;
  });
}

// Render
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(zoom, zoom);
  ctx.translate(-camX, -camY);

  // Draw edges
  links.forEach(l => {
    ctx.beginPath();
    ctx.moveTo(l.source.x, l.source.y);
    ctx.lineTo(l.target.x, l.target.y);
    const isHovered = hoveredNode && (l.source === hoveredNode || l.target === hoveredNode);
    ctx.strokeStyle = isHovered ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.04)';
    ctx.lineWidth = isHovered ? 1.5 : 0.5;
    ctx.stroke();
  });

  // Draw nodes
  nodes.forEach(n => {
    const isHovered = n === hoveredNode;
    const isConnected = hoveredNode && links.some(l =>
      (l.source === hoveredNode && l.target === n) || (l.target === hoveredNode && l.source === n)
    );
    const dimmed = hoveredNode && !isHovered && !isConnected;

    // Glow for hovered
    if (isHovered) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.radius * 3, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius * 3);
      grad.addColorStop(0, n.color + '30');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
    ctx.fillStyle = dimmed ? n.color + '20' : n.color + (isHovered ? 'FF' : 'CC');
    ctx.fill();

    // Label for hovered or high-connection nodes
    if (isHovered || isConnected) {
      ctx.fillStyle = dimmed ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.8)';
      ctx.font = `${11 / zoom}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(n.title, n.x, n.y - n.radius - 6);
    }
  });

  ctx.restore();
}

function loop() {
  simulate();
  draw();
  requestAnimationFrame(loop);
}
loop();

// Build legend
const domainList = [...new Set(atoms.map(a => getPrimaryDomain(a.domain)))];
const legendEl = document.getElementById('legend');
domainList.forEach(d => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${getDomainColor(d)}"></div>${d}`;
  legendEl.appendChild(item);
});
</script>
</body>
</html>
